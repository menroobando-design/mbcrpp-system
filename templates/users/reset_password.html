{% extends "layouts/base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        <h4 class="mb-0">

            🔑 Reset Password

        </h4>

    </div>

    <div class="card-body">

        <h5>

            {{ profile.user.username }}

        </h5>

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    New Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Confirm Password

                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    required>

            </div>

            <button class="btn btn-success">

                Reset Password

            </button>

            <a href="{% url 'user_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
