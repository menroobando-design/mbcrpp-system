{% extends "layouts/base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h4 class="mb-0">

            New Weekly Report

        </h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-success">

                Save Draft

            </button>

            <a
                href="/reports/"
                class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
