{% extends 'layouts/base.html' %}

{% block title %}Add Barangay{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Add Barangay</h4>
    </div>

    <div class="card-body">

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Save Barangay
            </button>

            <a href="{% url 'barangay_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
